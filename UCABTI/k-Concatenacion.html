				    <p>Definimos el operador <b>&sdot;<sub>k</sub></b> de la siguiente manera: </p>

<blockquote>
<p>x&sdot;<sub>k</sub>y = los primeros <b>k</b> símbolos de x&sdot;y, o x&sdot;y si |x&sdot;y| &lt; k </p></blockquote> 

<p>Si L y M son subconjuntos de &Sigma;<sup>&#42;</sup>, entonces definimos: </p>
<blockquote>
<p>L &sdot;<sub>k</sub> M = { x &sdot;<sub>k</sub> y | x &isin; L &and; y &isin; M } </p></blockquote>
